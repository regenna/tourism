<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <section id="contact">
        <h2 class="section-title">Liên Hệ Đặt Tour</h2>
        <div class="contact">
            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Họ và tên</label>
                    <input type="text" id="name" placeholder="Nhập họ và tên">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Nhập địa chỉ email">
                </div>

                <div class="form-group">
                    <label for="phone">Số điện thoại</label>
                    <input type="tel" id="phone" placeholder="Nhập số điện thoại">
                </div>

                <div class="form-group">
                    <label for="destination">Điểm đến</label>
                    <select id="destination">
                        <option value="">Chọn điểm đến</option>
                        <option value="halong">Vịnh Hạ Long</option>
                        <option value="hoian">Phố Cổ Hội An</option>
                        <option value="sapa">Sapa</option>
                        <option value="mekong">Đồng Bằng Sông Cửu Long</option>
                        <option value="phuquoc">Đảo Phú Quốc</option>
                        <option value="hue">Cố Đô Huế</option>
                        <option value="other">Điểm đến khác</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Ngày đi</label>
                    <input type="date" id="date">
                </div>

                <div class="form-group">
                    <label for="duration">Số ngày</label>
                    <select id="duration">
                        <option value="">Chọn số ngày</option>
                        <option value="1-3">1-3 ngày</option>
                        <option value="4-7">4-7 ngày</option>
                        <option value="8-14">8-14 ngày</option>
                        <option value="15+">15+ ngày</option>
                    </select>
                </div>

                <div class="form-group full">
                    <label for="message">Yêu cầu thêm</label>
                    <textarea id="message" placeholder="Nhập yêu cầu chi tiết của bạn"></textarea>
                </div>

                <div class="form-group">
                    <button type="submit" class="submit-btn">Gửi Yêu Cầu</button>
                </div>
            </form>
        </div>
    </section>
    </div>


</body>

</html>
